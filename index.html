<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Handle redirect from 404.html (GitHub Pages SPA routing)
    (function(l) {
      if (l.search && l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&').replace(/~hash~/g, '#');
        }).join('');
        window.history.replaceState(null, null, decoded);
      }
    }(window.location));
  </script>
</body>
